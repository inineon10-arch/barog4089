<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0eb">
<meta name="referrer" content="no-referrer">
<title>오답 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --card: #ffffff;
    --accent: #2d5be3;
    --accent2: #e3502d;
    --wrong-col: #d94040;
    --text: #1a1a2e;
    --text2: #6b6b80;
    --muted: #b0aab8;
    --border: #e2dcd8;
    --tip-bg: #eef3ff;
    --ex-bg: #faf8f5;
    --green: #1a9e6f;
    --pill-wrong: #fff0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Gowun Dodum', sans-serif; color: var(--text); overflow: hidden; -webkit-text-size-adjust: 100%; overscroll-behavior: none; touch-action: pan-y; }
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
  .header { flex-shrink: 0; padding: 12px 16px 8px; display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; }
  .header-left { min-width: 0; flex: 1; }
  .header-left .name { font-family: 'Space Grotesk', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); }
  .header-left .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--text); margin-top: 2px; letter-spacing: -0.5px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .index-display { font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .index-display span { color: var(--muted); font-weight: 400; }
  .prog-wrap { flex-shrink: 0; padding: 0 16px 10px; }
  .prog-dots { display: flex; justify-content: space-between; gap: 3px; }
  .pdot { flex: 1; height: 4px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
  .pdot.done { background: var(--accent); }
  .pdot.current { background: var(--accent); opacity: 0.4; }
  .pdot.done.all { background: var(--green); }
  .card-viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 0; touch-action: pan-y; user-select: none; -webkit-user-select: none; }
  .flash-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; will-change: transform, opacity; cursor: pointer; touch-action: pan-y; transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .flash-card.no-transition { transition: none !important; }
  .flash-card.dragging { transition: none !important; }
  .card-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08), 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
  .card-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; background: linear-gradient(90deg, var(--wrong-col) 0%, #ff9980 100%); }
  .card-content { flex: 1; padding: 16px 18px 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .face-meaning, .face-word { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .scroll-area { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; touch-action: pan-y; overscroll-behavior: contain; scrollbar-width: thin; }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; flex-shrink: 0; }
  .badge { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
  .b-num { background: var(--border); color: var(--text2); }
  .b-wrong { background: var(--pill-wrong); color: var(--wrong-col); border: 1px solid #ffcccc; }
  .b-blank { background: #fff5e8; color: #d97a20; border: 1px solid #ffddb0; }
  .b-pos { background: #f0f0ff; color: var(--accent); border: 1px solid #d0d8ff; }
  .meaning-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 8px; padding: 10px 0; min-height: 120px; }
  .meaning-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .meaning-text { font-size: 1.85rem; font-weight: 400; color: var(--text); line-height: 1.3; letter-spacing: -0.5px; }
  .word-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 6px; padding: 10px 0; min-height: 120px; }
  .word-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .word-text { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--text); letter-spacing: -1px; line-height: 1.1; word-break: break-word; }
  .word-pos { font-size: 0.76rem; color: var(--text2); margin-top: 2px; }
  .student-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding: 8px 12px; background: var(--pill-wrong); border-radius: 10px; border: 1px solid #ffcccc; flex-shrink: 0; }
  .student-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--wrong-col); flex-shrink: 0; }
  .student-ans { font-size: 0.82rem; color: var(--wrong-col); text-decoration: line-through; text-decoration-color: rgba(217,64,64,0.5); }
  .blank-label { font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .tip-box { background: var(--tip-bg); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 9px 13px; font-size: 0.74rem; color: #3a5ab0; line-height: 1.6; margin-top: 10px; flex-shrink: 0; }
  .tip-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
  .example-box { background: var(--ex-bg); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 0.72rem; color: var(--text2); line-height: 1.65; font-style: italic; margin-top: 7px; flex-shrink: 0; }
  .example-box em { color: var(--accent2); font-style: normal; font-weight: 600; }
  .tap-hint { text-align: center; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; padding-top: 8px; padding-bottom: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tap-hint::before, .tap-hint::after { content: ''; display: inline-block; width: 18px; height: 1px; background: var(--border); }
  .nav-hint { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 10px; }
  .nav-item { display: flex; align-items: center; gap: 5px; font-size: 0.63rem; color: var(--muted); }
  .nav-arrow { font-size: 0.95rem; color: var(--border); }
  .nav-center { font-size: 0.63rem; color: var(--muted); }
  .swipe-indicator { position: absolute; font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; border-radius: 10px; opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.1s; }
  .ind-prev { top: 50%; left: 16px; transform: translateY(-50%); color: var(--accent); background: rgba(45,91,227,0.08); border: 1.5px solid rgba(45,91,227,0.2); }
  .ind-next { top: 50%; right: 16px; transform: translateY(-50%); color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .ind-up { top: 16px; left: 50%; transform: translateX(-50%); color: var(--green); background: rgba(26,158,111,0.08); border: 1.5px solid rgba(26,158,111,0.2); }
  .ind-down { bottom: 16px; left: 50%; transform: translateX(-50%); color: var(--text2); background: rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
  .random-btn { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 700; padding: 8px 13px; border-radius: 18px; border: 1.5px solid var(--accent2); background: transparent; color: var(--accent2); cursor: pointer; transition: all 0.2s; min-height: 36px; touch-action: manipulation; display: inline-flex; align-items: center; gap: 4px; }
  .random-btn:active { transform: scale(0.93); }
  .random-btn.shuffled { background: var(--accent2); color: #fff; }
  .mode-chip { display: inline-flex; align-items: center; gap: 2px; background: var(--border); border-radius: 22px; padding: 3px; }
  .mode-btn { font-family: 'Space Grotesk', sans-serif; font-size: 0.6rem; font-weight: 600; padding: 8px 12px; border-radius: 18px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.2s; min-height: 36px; min-width: 60px; touch-action: manipulation; }
  .mode-btn.active { background: var(--card); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .end-card { position: absolute; width: calc(100% - 24px); max-width: 430px; height: calc(100% - 10px); max-height: 620px; touch-action: pan-y; transition: transform 0.32s cubic-bezier(.4,0,.2,1), opacity 0.32s; }
  .end-card.no-transition { transition: none !important; }
  .end-face { width: 100%; height: 100%; background: var(--card); border-radius: 22px; border: 1.5px solid var(--border); box-shadow: 0 8px 40px rgba(45,91,227,0.08); display: flex; flex-direction: column; overflow: hidden; }
  .end-line { height: 4px; flex-shrink: 0; border-radius: 22px 22px 0 0; background: linear-gradient(90deg, var(--accent) 0%, #6a8eff 50%, var(--green) 100%); }
  .end-content { flex: 1; padding: 24px 22px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; }
  .end-emoji { font-size: 3.4rem; line-height: 1; animation: pop 0.6s cubic-bezier(.175,.885,.32,1.275); }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.15);opacity:1} 100%{transform:scale(1);opacity:1} }
  .end-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .end-title { font-size: 1.55rem; font-weight: 400; color: var(--text); line-height: 1.35; margin-top: -6px; }
  .end-subtitle { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .restart-btn { background: var(--accent); color: #fff; border: none; border-radius: 16px; padding: 14px 32px; font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 16px rgba(45,91,227,0.25); min-height: 48px; display: inline-flex; align-items: center; gap: 8px; touch-action: pan-y; }
  .end-hint { font-size: 0.65rem; color: var(--muted); }
  .tts-btn { background: none; border: 1.5px solid var(--border); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 1.1rem; transition: all 0.18s; touch-action: manipulation; flex-shrink: 0; margin-top: 6px; }
  .tts-btn:active { transform: scale(0.88); background: var(--tip-bg); border-color: var(--accent); color: var(--accent); }
  .tts-btn.playing { border-color: var(--accent); color: var(--accent); background: var(--tip-bg); animation: pulse-tts 0.8s ease-in-out infinite alternate; }
  @keyframes pulse-tts { from{box-shadow:0 0 0 0 rgba(45,91,227,0.15)} to{box-shadow:0 0 0 6px rgba(45,91,227,0)} }
  @media(max-height:700px){.meaning-text{font-size:1.6rem}.word-text{font-size:1.9rem}.meaning-center,.word-center{min-height:90px;padding:6px 0}.tip-box,.example-box{font-size:0.7rem;padding:8px 11px}}
  @media(max-height:600px){.header{padding:8px 16px 6px}.meaning-text{font-size:1.4rem}.word-text{font-size:1.7rem}.nav-hint{padding:6px 20px 8px}}
</style>
</head>

<div id="app">

    <div class="header-left">




      <div class="name">바로그영어  </div>
    





  <div class="title">오답 단어장</div>
    </div>

</div>

  { num:38, word:'eager', pos:'형용사', type:'blank',
    correct:'간절히 바라는, 열심인', student:'',

    correct:'역경, 불운', student:'광고',
    tip:'advertisement(광고)와 혼동 ⚠️',
    example:'He overcame great <em>adversity</em>.' },

  { num:42, word:'priority', pos:'명사', type:'wrong',
    correct:'우선순위, 우선권', student:'이전의',
    tip:'prior(이전의)와 관련 있지만 뜻 다름 ⚠️',

  { num:48, word:'register', pos:'동사/명사', type:'wrong',

];









let idx = 0, startFace = 'word', showingBack = false, isAnimating = false;

document.getElementById('btn-meaning').addEventListener('click', () => { if(isAnimating)return; startFace='meaning'; showingBack=false; document.getElementById('btn-meaning').classList.add('active'); document.getElementById('btn-word').classList.remove('active'); if(idx<cards.length)renderCard(0); });
document.getElementById('btn-word').addEventListener('click', () => { if(isAnimating)return; startFace='word'; showingBack=false; document.getElementById('btn-word').classList.add('active'); document.getElementById('btn-meaning').classList.remove('active'); if(idx<cards.length)renderCard(0); });

const originalCards = [...cards]; let isShuffled = false;
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
document.getElementById('btn-random').addEventListener('click',function(){if(isAnimating)return;haptic(20);if(!isShuffled){const s=shuffleArray(cards);cards.length=0;s.forEach(c=>cards.push(c));isShuffled=true;this.classList.add('shuffled');this.textContent='🔀 랜덤ON';}else{cards.length=0;originalCards.forEach(c=>cards.push(c));isShuffled=false;this.classList.remove('shuffled');this.textContent='🔀 랜덤';}idx=0;showingBack=false;buildDots();renderCard(0);});

let currentAudio=null;
function speakWord(btn,word){if(currentAudio){currentAudio.pause();currentAudio=null;document.querySelectorAll('.tts-btn.playing').forEach(b=>b.classList.remove('playing'));if(btn.dataset.playing==='true'){btn.dataset.playing='';return;}}btn.classList.add('playing');btn.dataset.playing='true';const url=`https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(word)}`;const audio=new Audio(url);currentAudio=audio;audio.onended=()=>{btn.classList.remove('playing');btn.dataset.playing='';currentAudio=null;};audio.onerror=()=>{btn.classList.remove('playing');btn.dataset.playing='';currentAudio=null;const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;window.speechSynthesis&&window.speechSynthesis.speak(u);};audio.play().catch(()=>audio.onerror());}

function buildDots(){const wrap=document.getElementById('prog-dots');wrap.innerHTML='';cards.forEach((_,i)=>{const d=document.createElement('div');d.className='pdot';d.id=`dot-${i}`;wrap.appendChild(d);});updateDots();}
function updateDots(){const isEnd=idx>=cards.length;cards.forEach((_,i)=>{const d=document.getElementById(`dot-${i}`);if(!d)return;d.className='pdot'+(isEnd?' done all':i<idx?' done':i===idx?' current':'');});document.getElementById('cur').textContent=isEnd?'✓':(idx+1);document.getElementById('tot').textContent=cards.length;}

function buildCardHTML(card){
  const isBlank=card.student==='(무응답)';
  const badgeType=isBlank?`<span class="badge b-blank">미응답</span>`:`<span class="badge b-wrong">오답</span>`;
  const studentHTML=`<div class="student-row"><span class="student-label">내 답</span>${isBlank?`<span class="blank-label">— 미응답</span>`:`<span class="student-ans">${card.student}</span>`}</div>`;
  const badges=`<div class="badges"><span class="badge b-num">No.${card.num}</span>${badgeType}<span class="badge b-pos">${card.pos}</span></div>`;
  const MFACE=`<div class="face-meaning">${badges}<div class="meaning-center"><div class="meaning-label">뜻</div><div class="meaning-text">${card.correct}</div></div><div class="tap-hint">탭해서 영단어 보기</div></div>`;
  const MBACK=`<div class="face-meaning">${badges}<div class="scroll-area"><div class="word-center" style="min-height:90px"><div class="word-label">영단어</div><div class="word-text">${card.word}</div><div class="word-pos">${card.pos}</div></div>${studentHTML}<div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div><div class="example-box">${card.example}</div></div><div class="tap-hint">탭해서 뜻 보기</div></div>`;
  const WFACE=`<div class="face-word">${badges}<div class="word-center"><div class="word-label">영단어</div><div class="word-text">${card.word}</div><div class="word-pos">${card.pos}</div><button class="tts-btn" onclick="event.stopPropagation();speakWord(this,'${card.word.replace(/'/g,"&#39;")}')" type="button">🔊</button></div><div class="tap-hint">탭해서 뜻 보기</div></div>`;
  const WBACK=`<div class="face-word">${badges}<div class="scroll-area"><div class="word-center" style="min-height:80px"><div class="word-label">영단어</div><div class="word-text" style="font-size:1.6rem">${card.word}</div></div><div class="meaning-label" style="text-align:center;margin-bottom:6px">뜻</div><div class="meaning-text" style="text-align:center;font-size:1.35rem;margin-bottom:10px">${card.correct}</div>${studentHTML}<div class="tip-box"><div class="tip-title">💡 암기 팁</div>${card.tip}</div><div class="example-box">${card.example}</div></div><div class="tap-hint">탭해서 영단어 보기</div></div>`;
  return{frontHTML:startFace==='meaning'?MFACE:WFACE,backHTML:startFace==='meaning'?MBACK:WBACK};
}

function buildEndHTML(){return`<div class="end-face"><div class="end-line"></div><div class="end-content"><div class="end-emoji">🎉</div><div><div class="end-label">All Done</div><div class="end-title">학습을 모두 마쳤어요!</div></div><div class="end-subtitle">오답 단어 ${cards.length}개를 모두 복습했어요.<br>한 번 더 반복하면 더욱 확실해져요 ✨</div><button class="restart-btn" id="restart-btn" type="button"><span>↻</span><span>다시 시작하기</span></button><div class="end-hint">→ 스와이프하면 마지막 카드로 돌아가요</div></div></div>`;}

let cardEl=null;
function renderCard(direction){
  const vp=document.getElementById('viewport');
  const old=vp.querySelector('.flash-card,.end-card');
  const isEnd=idx>=cards.length;
  const el=document.createElement('div');
  if(isEnd){el.className='end-card no-transition';el.innerHTML=buildEndHTML();}
  else{const{frontHTML,backHTML}=buildCardHTML(cards[idx]);el.className='flash-card no-transition';el.innerHTML=`<div class="card-face"><div class="card-line"></div><div class="card-content">${showingBack?backHTML:frontHTML}</div></div>`;}
  if(direction!==0){el.style.transform=`translateX(${direction>0?'100%':'-100%'})`;isAnimating=true;}
  vp.appendChild(el);cardEl=el;
  if(isEnd){const btn=el.querySelector('#restart-btn');if(btn)btn.addEventListener('click',restart);}
  requestAnimationFrame(()=>requestAnimationFrame(()=>{el.classList.remove('no-transition');el.style.transform='translateX(0)';}));
  if(old){old.classList.remove('no-transition');old.style.transform=`translateX(${direction>0?'-100%':'100%'})`;old.style.opacity='0.3';setTimeout(()=>{if(old.parentNode)old.remove();isAnimating=false;},350);}else isAnimating=false;
  updateDots();
}

function restart(){if(isAnimating)return;idx=0;showingBack=false;haptic(15);renderCard(-1);}
function flipCard(el){if(!el||isAnimating||idx>=cards.length||!el.querySelector('.card-face'))return;showingBack=!showingBack;const{frontHTML,backHTML}=buildCardHTML(cards[idx]);const content=el.querySelector('.card-content');const face=el.querySelector('.card-face');face.style.transition='transform 0.15s ease';face.style.transform='scale(0.97)';setTimeout(()=>{content.innerHTML=showingBack?backHTML:frontHTML;face.style.transform='scale(1)';},80);setTimeout(()=>{face.style.transition='';},230);}
function haptic(ms=8){try{if(navigator.vibrate)navigator.vibrate(ms);}catch(_){}}

function initInteraction(){
  const vp=document.getElementById('viewport');
  let sX=0,sY=0,sT=0,tracking=false,hasMoved=false,locked=null,pid=null;
  const DL=8,TT=8,SD=60,SV=30,ST=350,VD=45,VV=25;
  function getCard(){return vp.querySelector('.flash-card,.end-card');}
  function startT(x,y,t){if(isAnimating)return false;if(t&&t.closest&&t.closest('.tts-btn'))return false;tracking=true;hasMoved=false;locked=null;sX=x;sY=y;sT=Date.now();const c=getCard();if(c)c.classList.add('dragging');return true;}
  function moveT(x,y,ev){if(!tracking)return;const dx=x-sX,dy=y-sY;if(locked===null){if(Math.abs(dx)>DL||Math.abs(dy)>DL)locked=Math.abs(dx)>Math.abs(dy)*1.1?'h':Math.abs(dy)>Math.abs(dx)*1.1?'v':'h';}
  if(locked==='h'){if(ev&&ev.cancelable&&ev.type==='touchmove')ev.preventDefault();hasMoved=true;const c=getCard();if(c)c.style.transform=`translateX(${dx*((dx>0&&idx===0)||(dx<0&&idx>=cards.length)?0.25:0.55)}px)`;const t=Math.min(Math.abs(dx)/70,1);if(dx>5){document.getElementById('ind-prev').style.opacity=String(t*0.9);document.getElementById('ind-next').style.opacity='0';}else if(dx<-5){document.getElementById('ind-next').style.opacity=String(t*0.9);document.getElementById('ind-prev').style.opacity='0';}else{document.getElementById('ind-prev').style.opacity='0';document.getElementById('ind-next').style.opacity='0';}}
  else if(locked==='v'){if(ev&&ev.cancelable&&ev.type==='touchmove')ev.preventDefault();hasMoved=true;const c=getCard();if(c)c.style.transform=`translateY(${dy*0.25}px)`;const t=Math.min(Math.abs(dy)/50,1);if(dy<-5){document.getElementById('ind-up').style.opacity=String(t*0.9);document.getElementById('ind-down').style.opacity='0';}else if(dy>5){document.getElementById('ind-down').style.opacity=String(t*0.9);document.getElementById('ind-up').style.opacity='0';}else{document.getElementById('ind-up').style.opacity='0';document.getElementById('ind-down').style.opacity='0';}}}
  function endT(ex,ey){if(!tracking&&locked!=='h'&&locked!=='v'){locked=null;return;}tracking=false;['ind-prev','ind-next','ind-up','ind-down'].forEach(id=>document.getElementById(id).style.opacity='0');const c=getCard();if(c)c.classList.remove('dragging');const dx=ex-sX,dy=ey-sY,dt=Date.now()-sT;
  if(locked==='v'&&hasMoved){if(c)c.style.transform='';if((dt<ST&&Math.abs(dy)>VV)||Math.abs(dy)>VD){if(idx<cards.length){haptic(8);flipCard(c);}}else if(c){c.style.transition='transform 0.25s cubic-bezier(.4,0,.2,1)';c.style.transform='translateY(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}locked=null;return;}
  const wh=locked==='h'&&hasMoved,fast=wh&&dt<ST&&Math.abs(dx)>SV,far=wh&&Math.abs(dx)>SD;
  if(wh&&(fast||far)){if(c)c.style.transform='';if(dx>0&&idx>0){idx--;showingBack=false;haptic(10);renderCard(-1);}else if(dx<0&&idx<cards.length){idx++;showingBack=false;haptic(10);renderCard(1);}else if(c){c.style.transition='transform 0.3s cubic-bezier(.175,.885,.32,1.275)';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},350);}}
  else{if(c&&wh){c.style.transition='transform 0.25s cubic-bezier(.4,0,.2,1)';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}else if(c)c.style.transform='';if(locked===null&&Math.abs(dx)<TT&&Math.abs(dy)<TT)flipCard(c);}locked=null;}
  function cancelT(){tracking=false;hasMoved=false;locked=null;const c=getCard();if(c){c.classList.remove('dragging');c.style.transition='transform 0.25s';c.style.transform='translateX(0)';setTimeout(()=>{if(c)c.style.transition='';},280);}['ind-prev','ind-next','ind-up','ind-down'].forEach(id=>document.getElementById(id).style.opacity='0');}
  if(window.PointerEvent){vp.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse'&&e.button!==0)return;if(pid!==null)return;if(!startT(e.clientX,e.clientY,e.target))return;pid=e.pointerId;});vp.addEventListener('pointermove',e=>{if(e.pointerId!==pid)return;moveT(e.clientX,e.clientY,e);});vp.addEventListener('pointerup',e=>{if(e.pointerId!==pid)return;pid=null;endT(e.clientX,e.clientY);});vp.addEventListener('pointercancel',e=>{if(e.pointerId!==pid)return;pid=null;cancelT();});}
  else{vp.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;startT(e.touches[0].clientX,e.touches[0].clientY,e.target);},{passive:true});vp.addEventListener('touchmove',e=>{if(!tracking||e.touches.length!==1)return;moveT(e.touches[0].clientX,e.touches[0].clientY,e);},{passive:false});vp.addEventListener('touchend',e=>{if(!e.changedTouches||!e.changedTouches.length)return;endT(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:true});vp.addEventListener('touchcancel',cancelT,{passive:true});let md=false;vp.addEventListener('mousedown',e=>{if(!startT(e.clientX,e.clientY,e.target))return;md=true;});window.addEventListener('mousemove',e=>{if(!md)return;moveT(e.clientX,e.clientY,e);});window.addEventListener('mouseup',e=>{if(!md)return;md=false;endT(e.clientX,e.clientY);});}
}

document.addEventListener('keydown',e=>{if(isAnimating)return;if(e.key==='ArrowRight'&&idx>0){idx--;showingBack=false;renderCard(-1);}else if(e.key==='ArrowLeft'&&idx<cards.length){idx++;showingBack=false;renderCard(1);}else if(e.key===' '||e.key==='Enter'){e.preventDefault();if(idx>=cards.length)restart();else if(cardEl)flipCard(cardEl);}});
let lte=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lte<=300)e.preventDefault();lte=n;},{passive:false});
window.addEventListener('resize',()=>document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`));
document.documentElement.style.setProperty('--app-vh',`${window.innerHeight*0.01}px`);
buildDots();initInteraction();renderCard(0);
</script>
